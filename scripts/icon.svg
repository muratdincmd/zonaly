<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.7"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="1024" height="1024" rx="224" ry="224"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Globe arcs — horizontal ellipses suggesting latitude lines -->
  <ellipse cx="512" cy="512" rx="270" ry="270"
           fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="22"/>
  <ellipse cx="512" cy="512" rx="270" ry="112"
           fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="18"/>
  <ellipse cx="512" cy="512" rx="270" ry="40"
           fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="14"/>
  <!-- Vertical meridian -->
  <ellipse cx="512" cy="512" rx="112" ry="270"
           fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="18"/>

  <!-- "Z" lettermark — bold, slightly rounded stroke caps -->
  <g fill="none" stroke="white" stroke-width="82" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top bar -->
    <line x1="310" y1="312" x2="714" y2="312"/>
    <!-- Diagonal -->
    <line x1="714" y1="312" x2="310" y2="712"/>
    <!-- Bottom bar -->
    <line x1="310" y1="712" x2="714" y2="712"/>
  </g>
</svg>
